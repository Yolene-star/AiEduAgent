services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      DIFY_BASE_URL: ${DIFY_BASE_URL:-https://api.dify.ai/v1}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_APP_ID: ${DIFY_APP_ID:-}
      JUDGE0_BASE_URL: ${JUDGE0_BASE_URL:-}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY:-}
      SQLITE_DB_PATH: /data/aieduagent.db
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
