id: U1-C05
title: 训练集、验证集和测试集
version: 1
status: model_checked
prerequisites:
  - U1-C03
aliases:
  - 训练集
  - 验证集
  - 测试集
  - train test split
  - 数据划分
keywords:
  - 训练集
  - 验证集
  - 测试集
  - 划分
  - 评估
