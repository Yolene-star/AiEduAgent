canonical_claims:
  - 图像分类的目标是给整张图片预测一个或多个类别。
  - 训练好的分类模型可以对新的图片进行类别预测。
  - 图像分类通常需要图片数据、对应标签、训练过程和评估过程。
misconceptions:
  - 图像分类不是让模型真正像人一样理解世界，而是根据数据学习类别判断规律。
  - 分类模型给出的结果可能出错，需要用测试数据和实际使用反馈检查。
